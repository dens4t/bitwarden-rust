name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
            packages: ""

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: "-musl"
            archive: tar.gz
            packages: "musl-tools"

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: "-arm64"
            archive: tar.gz
            packages: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"
            linker: "aarch64-linux-gnu-gcc"

          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            suffix: "-windows.exe"
            archive: zip
            packages: "mingw-w64"
            linker: "x86_64-w64-mingw32-gcc"

          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: "-macos"
            archive: tar.gz
            packages: ""

          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: "-macos-arm64"
            archive: tar.gz
            packages: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install system dependencies
        if: matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Set cross-compiler linker
        if: matrix.linker != ''
        run: |
          TARGET_UPPER=${{ matrix.target }}
          TARGET_UPPER=${TARGET_UPPER//-/_}
          TARGET_UPPER=${TARGET_UPPER^^}
          echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=${{ matrix.linker }}" >> $GITHUB_ENV

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          echo "Binary size: $(du -sh target/${{ matrix.target }}/release/bitwarden-rs* 2>/dev/null)"

      - name: Prepare archive
        shell: bash
        run: |
          mkdir -p dist
          EXT="${{ matrix.suffix }}"
          BINARY="target/${{ matrix.target }}/release/bitwarden-rs"
          if [[ "$EXT" == *".exe" ]]; then
            BINARY="${BINARY}.exe"
          fi
          if [ -f "$BINARY" ]; then
            if [[ "${{ matrix.archive }}" == "zip" ]]; then
              cd dist
              cp "../$BINARY" "bitwarden-rs${EXT}"
              zip "bitwarden-rs-${{ matrix.target }}.zip" "bitwarden-rs${EXT}"
              cd ..
            else
              BASENAME=$(basename "$BINARY")
              tar -czf "dist/bitwarden-rs-${{ matrix.target }}.tar.gz" -C "$(dirname "$BINARY")" "$BASENAME"
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitwarden-rs-${{ matrix.target }}
          path: dist/*

  create-release:
    name: Create Release
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            ## 🚀 Bitwarden-rs Release

            ### 📦 Binary Downloads

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `bitwarden-rs-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux x86_64 (static) | `bitwarden-rs-x86_64-unknown-linux-musl.tar.gz` |
            | Linux ARM64 | `bitwarden-rs-aarch64-unknown-linux-gnu.tar.gz` |
            | Windows x86_64 | `bitwarden-rs-x86_64-pc-windows-gnu.zip` |
            | macOS x86_64 | `bitwarden-rs-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `bitwarden-rs-aarch64-apple-darwin.tar.gz` |

            ### ⚡ Cara Install

            ```bash
            # Linux
            tar -xzf bitwarden-rs-x86_64-unknown-linux-gnu.tar.gz
            chmod +x bitwarden-rs
            sudo mv bitwarden-rs /usr/local/bin/
            bitwarden-rs

            # Windows: Extract zip, run bitwarden-rs.exe
            # macOS: Same as Linux
            ```
